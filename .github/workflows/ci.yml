name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-build:
    name: Tests + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Check for pyproject.toml
        id: pyproject
        run: |
          if [ -f pyproject.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml not present yet — CI will activate after uv init PR."
          fi

      - name: Install Python
        if: steps.pyproject.outputs.exists == 'true'
        run: uv python install 3.11

      - name: Install dependencies
        if: steps.pyproject.outputs.exists == 'true'
        run: uv sync --frozen

      - name: Check architecture contracts
        if: steps.pyproject.outputs.exists == 'true'
        run: uv run lint-imports

      - name: Run tests
        if: steps.pyproject.outputs.exists == 'true'
        run: uv run pytest

      - name: Build distribution
        if: steps.pyproject.outputs.exists == 'true'
        run: uv build
